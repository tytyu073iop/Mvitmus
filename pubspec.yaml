name: vitmus
description: 'Interactive map of Vitebsk museums with weather forecast.'
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.3.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  shared_preferences: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/l10n/
